<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>本棚アプリ - 一覧</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h1 class="h3">私の本棚</h1>
        <a th:href="@{/}" class="btn btn-primary">本を登録する</a>
    </div>

    <div class="card shadow-sm">
        <div class="card-body p-0">
            <table class="table table-hover mb-0">
                <thead class="table-light">
                <tr>
                    <th style="width: 80px;">表紙</th>
                    <th>タイトル / 著者</th>
                    <th>読書期間</th>
                    <th>状態</th>
                    <th>操作</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="book : ${books}">
                    <td class="align-middle text-center">
                        <img th:if="${book.coverUrl}" th:src="${book.coverUrl}" style="height: 60px;" class="rounded shadow-sm">
                        <div th:unless="${book.coverUrl}" class="bg-secondary text-white small p-2 rounded">No Image</div>
                    </td>
                    <td class="align-middle">
                        <div class="fw-bold" th:text="${book.title}"></div>
                        <div class="text-muted small" th:text="${book.author}"></div>
                    </td>
                    <td class="align-middle">
                        <span th:text="${book.startDate}"></span>
                        <span class="mx-1">~</span>
                        <span th:text="${book.endDate ?: ''}"></span>
                    </td>
                    <td class="align-middle">
                        <span th:if="${book.completed}" class="badge bg-success">読了</span>
                        <span th:unless="${book.completed}" class="badge bg-warning text-dark">読みかけ</span>
                    </td>
                    <td class="align-middle">
                        <button class="btn btn-sm btn-outline-primary"
                                th:data-isbn="${book.isbn}"
                                th:data-enddate="${book.endDate ?: ''}"
                                onclick="openEditModal(this.getAttribute('data-isbn'), this.getAttribute('data-enddate'))">
                            編集
                        </button>
                    </td>
                </tr>
                <tr th:if="${#lists.isEmpty(books)}">
                    <td colspan="5" class="text-center py-5 text-muted">本が登録されていません。</td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<!-- Edit Modal -->
<div class="modal fade" id="editModal" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <form th:action="@{/update-end-date}" method="post">
                <div class="modal-header">
                    <h5 class="modal-title">読了日の変更</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" name="isbn" id="modalIsbn">
                    <div class="mb-3">
                        <label for="modalEndDate" class="form-label">読み終えた日</label>
                        <input type="text" name="endDate" id="modalEndDate" class="form-control datepicker">
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">キャンセル</button>
                    <button type="submit" class="btn btn-primary">更新する</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
<script>
    flatpickr(".datepicker", {
        locale: "ja",
        dateFormat: "Y-m-d",
        allowInput: true
    });

    const editModal = new bootstrap.Modal(document.getElementById('editModal'));

    function openEditModal(isbn, endDate) {
        document.getElementById('modalIsbn').value = isbn;
        document.getElementById('modalEndDate').value = endDate;
        editModal.show();
    }
</script>
</body>
</html>
