<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>本棚アプリ - ISBN入力</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="card-title h4 mb-4">本を登録する</h1>
                    <form th:action="@{/confirm}" th:object="${isbnForm}" method="post">
                        <div class="mb-3">
                            <label for="isbn" class="form-label">ISBNコードを入力してください</label>
                            <input type="text" th:field="*{isbn}" class="form-control" id="isbn" placeholder="例: 9784048930734" required>
                            <div th:if="${#fields.hasErrors('isbn')}" th:errors="*{isbn}" class="text-danger small"></div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100">確認する</button>
                    </form>
                    <div class="mt-3 text-center">
                        <a th:href="@{/list}" class="text-decoration-none small">本棚一覧を見る</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
