<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>本棚アプリ - 登録確認</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
</head>
<body class="bg-light">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h1 class="card-title h4 mb-4">本の情報を確認</h1>

                    <div class="row mb-4">
                        <div class="col-md-4 text-center">
                            <img th:if="${bookRegistrationForm.coverUrl}" th:src="${bookRegistrationForm.coverUrl}" class="img-fluid rounded shadow-sm" alt="Cover">
                            <div th:unless="${bookRegistrationForm.coverUrl}" class="bg-secondary text-white p-5 rounded">No Image</div>
                        </div>
                        <div class="col-md-8">
                            <h2 class="h5" th:text="${bookRegistrationForm.title}"></h2>
                            <p class="text-muted mb-1" th:text="'著者: ' + ${bookRegistrationForm.author}"></p>
                            <p class="text-muted mb-1" th:text="'出版社: ' + ${bookRegistrationForm.publisher}"></p>
                            <p class="text-muted" th:text="'発売日: ' + ${bookRegistrationForm.publishedDate}"></p>
                        </div>
                    </div>

                    <form th:action="@{/register}" th:object="${bookRegistrationForm}" method="post">
                        <input type="hidden" th:field="*{isbn}">
                        <input type="hidden" th:field="*{title}">
                        <input type="hidden" th:field="*{author}">
                        <input type="hidden" th:field="*{publisher}">
                        <input type="hidden" th:field="*{publishedDate}">
                        <input type="hidden" th:field="*{coverUrl}">

                        <div class="row mb-3">
                            <div class="col-md-6">
                                <label for="startDate" class="form-label">読み始めた日</label>
                                <input type="text" th:field="*{startDate}" class="form-control datepicker" id="startDate">
                            </div>
                            <div class="col-md-6">
                                <label for="endDate" class="form-label">読み終えた日</label>
                                <input type="text" th:field="*{endDate}" class="form-control datepicker" id="endDate">
                            </div>
                        </div>

                        <div class="d-flex justify-content-between">
                            <a th:href="@{/}" class="btn btn-outline-secondary">戻る</a>
                            <button type="submit" class="btn btn-success">登録する</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
<script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/ja.js"></script>
<script>
    flatpickr(".datepicker", {
        locale: "ja",
        dateFormat: "Y-m-d",
        allowInput: true
    });
</script>
</body>
</html>
